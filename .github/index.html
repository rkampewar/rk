<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily_hub | New Finds, Best Prices</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- EmailJS for sending emails -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        /* Custom styles for hiding scrollbar in carousel but keeping functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Smooth fade-in for modals */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .slide-in-right {
            animation: slideInRight 0.3s ease-out;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-x-hidden flex flex-col min-h-screen">

    <!-- Navigation -->
    <nav class="fixed w-full z-40 bg-white/90 backdrop-blur-md shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.scrollTo(0,0)">
                    <h1 class="text-2xl font-extrabold text-indigo-600 tracking-tight">Daily<span class="text-gray-800">_hub</span></h1>
                </div>
                <!-- Cart Button -->
                <div class="flex items-center">
                    <button onclick="toggleCart()" class="relative p-2 text-gray-600 hover:text-indigo-600 transition-colors">
                        <i class="fas fa-shopping-cart text-xl"></i>
                        <span id="cart-count" class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-red-500 rounded-full">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative h-screen flex items-center justify-center pt-16">
        <!-- Background Image -->
        <div class="absolute inset-0 z-0">
            <img src="https://i.ibb.co/bqPgVWj/top-view-workspace-concept-with-office-supplies.jpg" alt="Workspace Concept" class="w-full h-full object-cover">
            <!-- Overlay -->
            <div class="absolute inset-0 bg-black/50"></div>
        </div>
        
        <!-- Hero Content -->
        <div class="relative z-10 text-center px-4 max-w-4xl mx-auto">
            <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-4 drop-shadow-lg">
                Daily_hub
            </h1>
            <p class="text-xl md:text-3xl text-gray-200 font-light mb-8 drop-shadow-md">
                New Finds, Best Prices
            </p>
            <a href="#products" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-lg py-4 px-10 rounded-full shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1">
                Shop Now <i class="fas fa-arrow-down ml-2"></i>
            </a>
        </div>
    </section>

    <!-- Products Section -->
    <section id="products" class="py-20 bg-gray-50 flex-grow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <h2 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">Featured Products</h2>
                <div class="mt-2 w-24 h-1 bg-indigo-600 mx-auto rounded"></div>
            </div>

            <!-- Carousel Container -->
            <div class="relative group">
                <!-- Left Button -->
                <button onclick="scrollCarousel(-1)" class="absolute left-0 top-1/2 -translate-y-1/2 -ml-4 z-10 bg-white p-3 rounded-full shadow-md text-gray-600 hover:text-indigo-600 focus:outline-none hidden md:block opacity-0 group-hover:opacity-100 transition-opacity">
                    <i class="fas fa-chevron-left text-xl"></i>
                </button>

                <!-- Scrollable Track -->
                <div id="carousel-track" class="flex overflow-x-auto gap-6 pb-8 pt-4 px-4 snap-x snap-mandatory no-scrollbar scroll-smooth">
                    <!-- Products will be injected here by JS -->
                </div>

                <!-- Right Button -->
                <button onclick="scrollCarousel(1)" class="absolute right-0 top-1/2 -translate-y-1/2 -mr-4 z-10 bg-white p-3 rounded-full shadow-md text-gray-600 hover:text-indigo-600 focus:outline-none hidden md:block opacity-0 group-hover:opacity-100 transition-opacity">
                    <i class="fas fa-chevron-right text-xl"></i>
                </button>
            </div>
            
            <!-- Mobile scroll indicator -->
            <div class="text-center text-gray-400 text-sm mt-2 md:hidden">
                <i class="fas fa-arrows-alt-h mr-2"></i> Swipe to explore
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 py-8 text-center text-gray-400">
        <p class="mb-2">Daily_hub &copy; 2026. All rights reserved.</p>
        <p class="text-sm">Contact: kampewarrohan@gmail.com</p>
    </footer>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/9403863476" target="_blank" rel="noopener noreferrer" class="fixed bottom-6 left-6 z-30 bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg hover:bg-green-600 hover:scale-110 transition-transform duration-300" aria-label="Chat on WhatsApp">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <!-- Cart Sidebar Overlay -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/40 z-40 hidden fade-in" onclick="toggleCart()"></div>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[400px] bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <!-- Cart Header -->
        <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between bg-gray-50">
            <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-shopping-cart mr-2"></i> Your Cart</h2>
            <button onclick="toggleCart()" class="text-gray-500 hover:text-red-500 transition-colors p-2 rounded-full hover:bg-gray-200">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <!-- Cart Items -->
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4">
            <!-- Items injected by JS -->
            <div class="text-center text-gray-500 mt-10">Your cart is empty.</div>
        </div>

        <!-- Cart Footer & Checkout Form -->
        <div class="border-t border-gray-200 p-6 bg-gray-50">
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-600 font-medium">Subtotal</span>
                <span id="cart-total" class="text-2xl font-bold text-gray-900">$0.00</span>
            </div>

            <!-- Order Form -->
            <form id="order-form" onsubmit="sendOrder(event)" class="space-y-4">
                <div>
                    <label for="customer_name" class="block text-sm font-medium text-gray-700">Full Name</label>
                    <input type="text" id="customer_name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label for="customer_phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
                    <input type="tel" id="customer_phone" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                
                <button type="submit" id="submit-btn" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                    <i class="fas fa-paper-plane mr-2"></i> Place Order
                </button>
            </form>
        </div>
    </div>

    <!-- Custom Toast Notification -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 hidden fade-in flex items-center px-4 py-3 rounded shadow-lg text-white font-medium">
        <i id="toast-icon" class="mr-3 text-xl"></i>
        <span id="toast-message"></span>
    </div>

    <script>
        // --- 1. PRODUCT DATA ---
        const products = [
            {
                id: 1,
                name: "Premium Leather Notebook",
                price: 15.99,
                image: "https://i.ibb.co/H8S9CJm/Screenshot-2026-05-01-20-50-02-45-2c94496c64eeaa7ef093c298145d7980.jpg"
            },
            {
                id: 2,
                name: "Minimalist Desk Organizer",
                price: 24.50,
                image: "https://i.ibb.co/WvBLtbqk/Screenshot-2026-05-01-20-49-20-08-2c94496c64eeaa7ef093c298145d7980.jpg"
            },
            {
                id: 3,
                name: "Executive Fountain Pen Set",
                price: 35.00,
                image: "https://i.ibb.co/G4MTkGhP/Screenshot-2026-05-01-20-49-02-52-2c94496c64eeaa7ef093c298145d7980.jpg"
            },
            // Duplicating items to demonstrate the carousel scroll effect
            {
                id: 4,
                name: "Premium Leather Notebook (Blue)",
                price: 15.99,
                image: "https://i.ibb.co/H8S9CJm/Screenshot-2026-05-01-20-50-02-45-2c94496c64eeaa7ef093c298145d7980.jpg"
            },
            {
                id: 5,
                name: "Minimalist Desk Organizer (Wood)",
                price: 28.00,
                image: "https://i.ibb.co/WvBLtbqk/Screenshot-2026-05-01-20-49-20-08-2c94496c64eeaa7ef093c298145d7980.jpg"
            }
        ];

        let cart = [];

        // --- 2. INITIALIZATION & UI RENDERING ---
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            
            // Auto-sliding Carousel Logic
            const track = document.getElementById('carousel-track');
            let isHovering = false;
            
            track.addEventListener('mouseenter', () => isHovering = true);
            track.addEventListener('mouseleave', () => isHovering = false);
            
            setInterval(() => {
                if (!isHovering && window.innerWidth > 768) {
                    if (track.scrollLeft + track.clientWidth >= track.scrollWidth - 10) {
                        track.scrollTo({ left: 0, behavior: 'smooth' });
                    } else {
                        scrollCarousel(1);
                    }
                }
            }, 3000);
        });

        function renderProducts() {
            const track = document.getElementById('carousel-track');
            track.innerHTML = '';

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = "flex-none w-[280px] sm:w-[320px] bg-white rounded-2xl shadow-sm hover:shadow-xl transition-shadow duration-300 overflow-hidden snap-center group border border-gray-100";
                
                card.innerHTML = `
                    <div class="relative h-64 overflow-hidden bg-gray-100">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="p-5">
                        <h3 class="text-lg font-bold text-gray-900 mb-1 truncate">${product.name}</h3>
                        <p class="text-indigo-600 font-bold text-xl mb-4">$${product.price.toFixed(2)}</p>
                        <button onclick="addToCart(${product.id})" class="w-full bg-indigo-50 hover:bg-indigo-600 text-indigo-700 hover:text-white border border-indigo-200 hover:border-transparent font-medium py-2.5 px-4 rounded-lg transition-colors flex justify-center items-center">
                            <i class="fas fa-cart-plus mr-2"></i> Add to Cart
                        </button>
                    </div>
                `;
                track.appendChild(card);
            });
        }

        function scrollCarousel(direction) {
            const track = document.getElementById('carousel-track');
            const scrollAmount = 340; // width of card + gap
            track.scrollBy({ left: scrollAmount * direction, behavior: 'smooth' });
        }

        // --- 3. CART FUNCTIONALITY ---
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            
            updateCartUI();
            showToast(`${product.name} added to cart!`, 'success');
        }

        function updateItemQty(productId, delta) {
            const itemIndex = cart.findIndex(item => item.id === productId);
            if (itemIndex > -1) {
                cart[itemIndex].qty += delta;
                if (cart[itemIndex].qty <= 0) {
                    cart.splice(itemIndex, 1);
                }
                updateCartUI();
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartTotal = document.getElementById('cart-total');

            // Update Badge Count
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            cartCount.innerText = totalItems;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<div class="text-center text-gray-500 mt-10"><i class="fas fa-box-open text-4xl mb-3 text-gray-300 block"></i> Your cart is empty.</div>`;
                cartTotal.innerText = `$0.00`;
                return;
            }

            // Render Items
            cartItemsContainer.innerHTML = '';
            let totalCost = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                totalCost += itemTotal;

                const itemElement = document.createElement('div');
                itemElement.className = "flex items-center gap-4 bg-white p-3 rounded-lg border border-gray-100 shadow-sm";
                itemElement.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" class="w-16 h-16 object-cover rounded-md border border-gray-200">
                    <div class="flex-1 min-w-0">
                        <h4 class="text-sm font-bold text-gray-900 truncate">${item.name}</h4>
                        <p class="text-sm text-indigo-600 font-medium">$${item.price.toFixed(2)}</p>
                        <div class="flex items-center mt-2 space-x-2">
                            <button onclick="updateItemQty(${item.id}, -1)" class="w-6 h-6 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 flex items-center justify-center">-</button>
                            <span class="text-sm font-medium w-4 text-center">${item.qty}</span>
                            <button onclick="updateItemQty(${item.id}, 1)" class="w-6 h-6 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 flex items-center justify-center">+</button>
                        </div>
                    </div>
                    <button onclick="removeFromCart(${item.id})" class="text-gray-400 hover:text-red-500 p-2">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                cartItemsContainer.appendChild(itemElement);
            });

            cartTotal.innerText = `$${totalCost.toFixed(2)}`;
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            
            if (sidebar.classList.contains('translate-x-full')) {
                // Open
                sidebar.classList.remove('translate-x-full');
                overlay.classList.remove('hidden');
                document.body.style.overflow = 'hidden'; // prevent background scrolling
            } else {
                // Close
                sidebar.classList.add('translate-x-full');
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        // --- 4. TOAST NOTIFICATION SYSTEM ---
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastMessage = document.getElementById('toast-message');

            toast.className = "fixed top-20 left-1/2 transform -translate-x-1/2 z-50 fade-in flex items-center px-6 py-3 rounded-full shadow-xl font-medium transition-all duration-300";
            
            if (type === 'success') {
                toast.classList.add('bg-green-600', 'text-white');
                toastIcon.className = "fas fa-check-circle mr-2 text-lg";
            } else if (type === 'error') {
                toast.classList.add('bg-red-600', 'text-white');
                toastIcon.className = "fas fa-exclamation-circle mr-2 text-lg";
            } else if (type === 'warning') {
                toast.classList.add('bg-yellow-500', 'text-white');
                toastIcon.className = "fas fa-info-circle mr-2 text-lg";
            }

            toastMessage.innerText = message;
            toast.classList.remove('hidden');

            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // --- 5. EMAILJS INTEGRATION ---
        
        // IMPORTANT: Replace these with your actual EmailJS IDs
        const EMAILJS_PUBLIC_KEY = 'YOUR_PUBLIC_KEY'; 
        const EMAILJS_SERVICE_ID = 'YOUR_SERVICE_ID';
        const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';

        // Initialize EmailJS
        (function() {
            if(EMAILJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY') {
                emailjs.init(EMAILJS_PUBLIC_KEY);
            }
        })();

        async function sendOrder(e) {
            e.preventDefault();

            if (cart.length === 0) {
                showToast("Your cart is empty!", "error");
                return;
            }

            const name = document.getElementById('customer_name').value;
            const phone = document.getElementById('customer_phone').value;
            const btn = document.getElementById('submit-btn');

            // Format Order Details for Email
            let orderDetailsText = "ORDER SUMMARY:\n-------------------\n";
            let total = 0;
            cart.forEach(item => {
                orderDetailsText += `${item.name} | Qty: ${item.qty} | Price: $${(item.price * item.qty).toFixed(2)}\n`;
                total += (item.price * item.qty);
            });
            orderDetailsText += `-------------------\nTOTAL: $${total.toFixed(2)}`;

            const templateParams = {
                owner_email: 'kampewarrohan@gmail.com', // Sends to shop owner
                customer_name: name,
                customer_phone: phone,
                order_details: orderDetailsText
            };

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Sending...';

            try {
                // If the user hasn't put their own keys yet, simulate the action
                if(EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
                    console.log("Mock Email Data:", templateParams);
                    setTimeout(() => {
                        showToast("System Setup Required: Please add your EmailJS keys in the HTML file.", "warning");
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Place Order';
                    }, 1500);
                    return;
                }

                // Actual API call
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                
                showToast("Order sent successfully! We'll contact you soon.", "success");
                
                // Clear form and cart
                document.getElementById('order-form').reset();
                cart = [];
                updateCartUI();
                setTimeout(() => toggleCart(), 1500);

            } catch (error) {
                console.error("EmailJS Error:", error);
                showToast("Failed to send order. Please try again.", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Place Order';
            }
        }
    </script>
</body>
</html>
